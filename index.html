<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어 맞추기 게임</title>
  <style>
    :root {
      --bg: #f6f1ff;
      --panel: #fff8ff;
      --accent: #95b5ff;
      --accent-2: #ffaccc;
      --text: #3f2d56;
      --border: #6e5a8a;
      --shadow: rgba(116, 83, 162, 0.16);
      --danger: #f26c7c;
      --success: #76c893;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      background: radial-gradient(circle at top left, #fde4ff 0%, transparent 30%),
                  radial-gradient(circle at bottom right, #d8f3dc 0%, transparent 30%),
                  linear-gradient(180deg, #fffdf7 0%, #ebe4ff 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 4rem);
      letter-spacing: 0.1em;
    }

    .header p {
      margin: 12px auto 0;
      max-width: 640px;
      line-height: 1.7;
      opacity: 0.85;
    }

    .panel {
      background: var(--panel);
      border: 4px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 50px var(--shadow);
      padding: 20px;
      margin-bottom: 24px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .flex {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1 1 250px;
      min-width: 250px;
      background: linear-gradient(180deg, #fff, #f7efff);
      border: 4px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%);
      pointer-events: none;
    }

    button,
    input[type=file] {
      font-family: inherit;
      border: 4px solid var(--border);
      border-radius: 20px;
      background: #ffffff;
      color: var(--text);
      padding: 16px 20px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      outline: none;
      display: inline-block;
    }

    button:hover,
    input[type=file]:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .status-item {
      background: rgba(180, 204, 255, 0.35);
      border: 2px dashed rgba(74, 91, 255, 0.35);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.95rem;
    }

    .hint-box {
      background: #fff4f8;
      border: 4px dashed #ffb3c9;
      border-radius: 26px;
      padding: 20px 18px;
      margin: 0 auto 16px;
      max-width: 640px;
      text-align: center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7);
    }

    .hint-box strong {
      display: block;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .arena {
      position: relative;
      height: 420px;
      margin: 0 auto;
      max-width: 980px;
      border: 4px solid var(--border);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,241,255,0.96));
      overflow: hidden;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.85);
    }

    .arena::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 42px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.8));
      pointer-events: none;
    }

    .falling-word {
      position: absolute;
      top: -48px;
      padding: 12px 18px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(77, 60, 125, 0.12);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      font-size: 1.05rem;
      text-align: center;
      animation: fall linear forwards;
    }

    .falling-word.wrong {
      background: #fff6f4;
      border-color: #f5a396;
    }

    .falling-word.correct {
      background: #ecffe7;
      border-color: #70c696;
    }

    @keyframes fall {
      from { transform: translateY(0); }
      to { transform: translateY(470px); }
    }

    .effect {
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      min-width: 260px;
      padding: 18px 24px;
      border: 4px solid var(--border);
      border-radius: 26px;
      background: rgba(255,255,255,0.95);
      text-align: center;
      font-size: 1.3rem;
      animation: pop 0.9s ease forwards;
      z-index: 10;
    }

    .effect.success { color: #2d7a3e; }
    .effect.warn { color: #b2303e; }

    @keyframes pop {
      0% { opacity: 0; transform: translate(-50%, -10px) scale(0.85); }
      40% { opacity: 1; transform: translate(-50%, 0) scale(1.05); }
      100% { opacity: 0; transform: translate(-50%, -20px) scale(0.95); }
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      margin-top: 8px;
      background: #f9f0ff;
      border: 3px solid #d9c8ff;
      border-radius: 16px;
      font-size: 0.95rem;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(25, 17, 57, 0.64);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 20;
    }

    .overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .modal {
      background: #fff;
      border: 5px solid var(--border);
      border-radius: 32px;
      padding: 34px 30px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 30px 90px rgba(34, 25, 85, 0.2);
    }

    .modal h3 {
      margin-top: 0;
      font-size: 2rem;
      letter-spacing: 0.08em;
    }

    .modal p {
      margin: 18px 0 24px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .flex { flex-direction: column; }
      .arena { height: 340px; }
      .hint-box strong { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>단어 맞추기 게임</h1>
      <p>CSV 단어장을 업로드하고, 화면 중앙 뜻에 맞는 영어 단어를 클릭하세요. 3번 틀리면 게임 오버!</p>
    </header>

    <section class="panel">
      <h2>게임 준비</h2>
      <div class="flex">
        <div class="card">
          <p><strong>1.</strong> CSV 파일을 업로드하세요.</p>
          <p>열 A: 영어 단어 / 열 B 이후: 한글 뜻</p>
          <input id="fileInput" type="file" accept=".csv" />
          <div style="margin-top:16px;"><button id="startButton" disabled>게임 시작</button></div>
        </div>

        <div class="card">
          <p><strong>2.</strong> 상태 보기</p>
          <ul class="status-list">
            <li class="status-item">단어 수: <span id="wordCount">0</span></li>
            <li class="status-item">남은 목숨: <span id="lifeCount">3</span></li>
            <li class="status-item">점수: <span id="scoreCount">0</span></li>
            <li class="status-item">남은 시간: <span id="timeCount">0</span>초</li>
          </ul>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="hint-box">
        <div>다음 뜻에 맞는 영어 단어를 찾아보세요</div>
        <strong id="currentHint">파일을 업로드 해주세요</strong>
        <div class="badge" id="questionBadge">단어가 준비되면 게임이 자동으로 시작됩니다.</div>
      </div>
      <div class="arena" id="arena"></div>
    </section>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="modal">
      <h3 id="gameOverTitle">Game Over!</h3>
      <p id="gameOverText">최종 점수: 0점</p>
      <button id="restartButton">다시 시작</button>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const startButton = document.getElementById('startButton');
    const arena = document.getElementById('arena');
    const currentHint = document.getElementById('currentHint');
    const wordCountEl = document.getElementById('wordCount');
    const lifeCountEl = document.getElementById('lifeCount');
    const scoreCountEl = document.getElementById('scoreCount');
    const timeCountEl = document.getElementById('timeCount');
    const badgeEl = document.getElementById('questionBadge');
    const overlay = document.getElementById('gameOverOverlay');
    const gameOverTitle = document.getElementById('gameOverTitle');
    const gameOverText = document.getElementById('gameOverText');
    const restartButton = document.getElementById('restartButton');

    let words = [];
    let order = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let timer = null;
    let remainingTime = 0;
    let questionTimeout = null;
    let consecutiveCorrect = 0;
    let audioContext = null;
    let gameActive = false;
    let questionActive = false;

    function parseCsv(text) {
      const rows = [];
      let current = '';
      let inQuotes = false;
      let row = [];

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === ',' && !inQuotes) {
          row.push(current.trim());
          current = '';
          continue;
        }

        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') {
            i += 1;
          }
          row.push(current.trim());
          if (row.some(cell => cell.length)) {
            rows.push(row);
          }
          row = [];
          current = '';
          continue;
        }

        current += char;
      }

      if (current.length || row.length) {
        row.push(current.trim());
        if (row.some(cell => cell.length)) {
          rows.push(row);
        }
      }

      return rows;
    }

    function loadCsv(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const raw = reader.result.replace(/\uFEFF/g, '');
        const rows = parseCsv(raw);
        words = rows
          .map(row => {
            const english = row[0]?.trim();
            const meanings = row.slice(1).map(cell => cell.trim()).filter(Boolean);
            return english && meanings.length ? { english, meanings } : null;
          })
          .filter(Boolean);

        if (words.length === 0) {
          alert('CSV 파일을 읽을 수 없거나, 형식이 잘못되었습니다.');
          return;
        }

        order = shuffle([...words]);
        remainingTime = words.length * 5;
        wordCountEl.textContent = words.length;
        lifeCountEl.textContent = lives;
        scoreCountEl.textContent = score;
        timeCountEl.textContent = remainingTime;
        startButton.disabled = false;
        badgeEl.textContent = '파일 로드 완료! 게임 시작을 누르거나 곧 자동으로 시작됩니다.';
        prepareAudio();

        if (!gameActive) {
          setTimeout(() => {
            if (!gameActive && !startButton.disabled) {
              startGame();
            }
          }, 700);
        }
      };
      reader.readAsText(file, 'UTF-8');
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function prepareAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(type) {
      if (!audioContext) return;
      const duration = 0.18;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      gain.gain.setValueAtTime(0, audioContext.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, audioContext.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

      if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(660, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, audioContext.currentTime + duration);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, audioContext.currentTime);
        osc.frequency.linearRampToValueAtTime(120, audioContext.currentTime + duration);
      }

      osc.start();
      osc.stop(audioContext.currentTime + duration);
    }

    function resetGame() {
      currentIndex = 0;
      score = 0;
      lives = 3;
      remainingTime = words.length * 5;
      consecutiveCorrect = 0;
      gameActive = false;
      questionActive = false;
      arena.innerHTML = '';
      overlay.classList.remove('open');
      lifeCountEl.textContent = lives;
      scoreCountEl.textContent = score;
      timeCountEl.textContent = remainingTime;
      currentHint.textContent = '파일을 업로드 해주세요';
      badgeEl.textContent = '준비 완료 후 자동 또는 버튼으로 게임을 시작합니다.';
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      if (questionTimeout) {
        clearTimeout(questionTimeout);
        questionTimeout = null;
      }
    }

    function startGame() {
      if (!words.length || gameActive) return;
      gameActive = true;
      currentIndex = 0;
      score = 0;
      lives = 3;
      consecutiveCorrect = 0;
      remainingTime = words.length * 5;
      startButton.disabled = true;
      badgeEl.textContent = '지금부터 문제를 시작합니다!';
      wordCountEl.textContent = words.length;
      lifeCountEl.textContent = lives;
      scoreCountEl.textContent = score;
      timeCountEl.textContent = remainingTime;
      arena.innerHTML = '';
      order = shuffle([...words]);

      timer = setInterval(() => {
        remainingTime -= 1;
        timeCountEl.textContent = remainingTime;
        if (remainingTime <= 0) {
          endGame('시간이 종료되었습니다!');
        }
      }, 1000);

      nextQuestion();
    }

    function nextQuestion() {
      arena.innerHTML = '';
      if (!gameActive) return;
      if (lives <= 0) {
        endGame('목숨이 모두 사라졌습니다.');
        return;
      }
      if (currentIndex >= order.length) {
        endGame('모든 단어를 완료했습니다!');
        return;
      }

      const currentWord = order[currentIndex];
      const hint = currentWord.meanings[Math.floor(Math.random() * currentWord.meanings.length)];
      currentHint.textContent = hint;
      badgeEl.textContent = `문제 ${currentIndex + 1} / ${order.length}`;
      questionActive = true;
      const candidateWords = [currentWord.english];
      const otherWords = words.filter(item => item.english !== currentWord.english);
      shuffle(otherWords);

      for (let i = 0; i < Math.min(3, otherWords.length); i++) {
        candidateWords.push(otherWords[i].english);
      }

      shuffle(candidateWords);
      const usedPositions = [];

      candidateWords.forEach((text, index) => {
        const x = getUniquePosition(usedPositions);
        const isCorrect = text === currentWord.english;
        const element = document.createElement('div');
        element.className = `falling-word ${isCorrect ? 'correct' : 'wrong'}`;
        element.textContent = text;
        element.style.left = `${x}%`;
        element.style.animationDuration = '5s';
        element.style.animationTimingFunction = 'linear';
        element.dataset.correct = isCorrect ? '1' : '0';
        element.addEventListener('click', event => {
          handleWordClick(event, isCorrect, element);
        });
        arena.appendChild(element);
      });

      questionTimeout = setTimeout(() => {
        if (questionActive) {
          questionActive = false;
          applyMissedAnswer();
        }
      }, 5000);
    }

    function getUniquePosition(used) {
      const attempts = 20;
      for (let i = 0; i < attempts; i++) {
        const x = 8 + Math.floor(Math.random() * 72);
        if (!used.some(value => Math.abs(value - x) < 18)) {
          used.push(x);
          return x;
        }
      }
      const fallback = 10 + used.length * 18;
      used.push(fallback);
      return fallback;
    }

    function handleWordClick(event, isCorrect, element) {
      event.stopPropagation();
      if (!questionActive) return;
      if (element.dataset.clicked === '1') return;
      element.dataset.clicked = '1';

      if (isCorrect) {
        questionActive = false;
        clearTimeout(questionTimeout);
        questionTimeout = null;
        score += 1;
        consecutiveCorrect += 1;
        playSound('correct');
        showEffect('+1점! 정답입니다!', 'success');
        if (consecutiveCorrect > 0 && consecutiveCorrect % 5 === 0) {
          setTimeout(() => {
            showEffect(randomPraise(), 'success');
          }, 200);
        }
        updateStatus();
        currentIndex += 1;
        setTimeout(nextQuestion, 600);
      } else {
        lives -= 1;
        score -= 1;
        consecutiveCorrect = 0;
        playSound('wrong');
        showEffect('-1점! 오답입니다.', 'warn');
        updateStatus();
        element.style.opacity = '0.35';
        element.style.pointerEvents = 'none';
        if (lives <= 0) {
          endGame('목숨이 모두 줄어들어 게임 오버입니다.');
        }
      }
    }

    function applyMissedAnswer() {
      if (!gameActive) return;
      lives -= 1;
      score -= 1;
      consecutiveCorrect = 0;
      playSound('wrong');
      showEffect('정답을 놓쳤습니다. -1점', 'warn');
      updateStatus();
      currentIndex += 1;
      if (lives <= 0) {
        endGame('목숨이 모두 줄어들어 게임 오버입니다.');
        return;
      }
      setTimeout(nextQuestion, 600);
    }

    function updateStatus() {
      lifeCountEl.textContent = Math.max(lives, 0);
      scoreCountEl.textContent = score;
      timeCountEl.textContent = remainingTime;
    }

    function showEffect(message, type) {
      const effect = document.createElement('div');
      effect.className = `effect ${type}`;
      effect.textContent = message;
      arena.appendChild(effect);
      setTimeout(() => {
        if (effect.parentNode) arena.removeChild(effect);
      }, 900);
    }

    function randomPraise() {
      const messages = ['Good Job!', 'Excellent!', 'You are Genius!'];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function endGame(reason) {
      gameActive = false;
      questionActive = false;
      if (timer) clearInterval(timer);
      if (questionTimeout) clearTimeout(questionTimeout);
      questionTimeout = null;
      timer = null;
      overlay.classList.add('open');
      gameOverText.textContent = `${reason} 최종 점수: ${score}점`;
      startButton.disabled = false;
      startButton.textContent = '다시 시작';
    }

    fileInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      resetGame();
      loadCsv(file);
    });

    startButton.addEventListener('click', () => {
      if (gameActive) return;
      overlay.classList.remove('open');
      startGame();
    });

    restartButton.addEventListener('click', () => {
      overlay.classList.remove('open');
      startGame();
    });
  </script>
</body>
</html>
